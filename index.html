  function startGame() {
    const mode = selectedSetupMode;
    const isTeam = (mode === 'sebeeta' || mode === 'kout');
    const n = isTeam ? 6 : parseInt(document.getElementById('numPlayers').value);

    const players = [];
    for (let i = 0; i < n; i++) {
      const name = document.getElementById('playerName' + i).value.trim() || `${t('playerDefault')} ${i+1}`;
      players.push(name);
    }

    if (isTeam) {
      // Validate balanced teams: must be exactly 3 / 3
      const aCount = setupTeams.filter(x => x === 0).length;
      const bCount = setupTeams.filter(x => x === 1).length;
      if (aCount !== 3 || bCount !== 3) {
        alert(t('teamUneven')(aCount, bCount));
        return;
      }
      state.playerTeam = setupTeams.slice();
      // Capture custom team names (fall back to defaults if blank)
      const nameA = (document.getElementById('teamNameInput0')?.value || '').trim() || t('teamAFull');
      const nameB = (document.getElementById('teamNameInput1')?.value || '').trim() || t('teamBFull');
      state.teamNames = [nameA, nameB];
    } else {
      state.playerTeam = [];
      state.teamNames = [];
    }

    state.gameMode = mode;
    state.players = players;
    state.scores = [];
    state.gameOver = false;
    // CRITICAL: reset gameLogged so the next win-detection in render() will
    // auto-navigate to the winner screen. Without this, a previously-finished
    // game's latch carried over and silently skipped the winner navigation.
    state.gameLogged = false;
    editingRound = null;
    resetContract();

    if (mode === 'sebeeta') {
      state.threshold = 201;
      state.winRule = 'lowest';  // individual lowest wins (anyone hitting 201 = team loses)
    } else if (mode === 'kout') {
      state.threshold = 101;
      state.winRule = 'highest'; // first team to 101 wins
    } else {
      state.threshold = parseInt(document.getElementById('threshold').value) || 201;
      state.winRule = document.getElementById('winRule').value;
    }

    state.currentScreen = 'play';
    save();
    navigate('play');
  }

  // Returns per-entity totals.
  //   custom/sebeeta: one total per player
  //   kout: one total per team [A, B]
  function totals() {
    const n = state.gameMode === 'kout' ? 2 : state.players.length;
    const out = new Array(n).fill(0);
    state.scores.forEach(round => {
      for (let i = 0; i < n; i++) out[i] += (round[i] || 0);
    });
    return out;
  }

  // For sebeeta only: sum per-player totals into per-team totals [A, B]
  function teamTotalsFromPlayers(pTotals) {
    const t = [0, 0];
    state.playerTeam.forEach((tIdx, pIdx) => { t[tIdx] += (pTotals[pIdx] || 0); });
    return t;
  }

  // Dealer = the side that's losing (opposite of the win condition).
  //   Custom / Sebeeta (winRule lowest) → highest individual score is dealer.
  //   Custom (winRule highest)          → lowest individual score is dealer.
  //   Kout (winRule highest, team-level) → lowest team total is dealer.
  function dealerIndex(totalsArr) {
    if (totalsArr.length === 0) return -1;
    if (state.winRule === 'highest') {
      let min = Infinity, idx = 0;
      totalsArr.forEach((v, i) => { if (v < min) { min = v; idx = i; } });
      return idx;
    } else {
      let max = -Infinity, idx = 0;
      totalsArr.forEach((v, i) => { if (v > max) { max = v; idx = i; } });
      return idx;
    }
  }

  // Returns { type: 'player' | 'team', idx } when there's a winner, else null.
  //   custom: winner is a player (highest or lowest depending on winRule)
  //   sebeeta: winner is the OPPOSING team of any player who hit threshold
  //   kout: winner is the team that hit the threshold
  function checkWinner(totalsArr) {
    if (state.gameMode === 'sebeeta') {
      for (let i = 0; i < totalsArr.length; i++) {
        if (totalsArr[i] >= state.threshold) {
          const loserTeam = state.playerTeam[i];
          return { type: 'team', idx: 1 - loserTeam };
        }
      }
      return null;
    }
    if (state.gameMode === 'kout') {
      // First team to reach threshold; if both crossed in the same round, the higher wins
      const reached = totalsArr.map((v, i) => v >= state.threshold ? i : -1).filter(i => i >= 0);
      if (reached.length === 0) return null;
      let max = -Infinity, idx = -1;
      reached.forEach(i => { if (totalsArr[i] > max) { max = totalsArr[i]; idx = i; } });
      return { type: 'team', idx };
    }
    // custom
    if (state.winRule === 'highest') {
      const reached = totalsArr.map((v, i) => v >= state.threshold ? i : -1).filter(i => i >= 0);
      if (reached.length === 0) return null;
      let max = -Infinity, idx = -1;
      reached.forEach(i => { if (totalsArr[i] > max) { max = totalsArr[i]; idx = i; } });
      return { type: 'player', idx };
    } else {
      const anyReached = totalsArr.some(v => v >= state.threshold);
      if (!anyReached) return null;
      let min = Infinity, idx = -1;
      totalsArr.forEach((v, i) => { if (v < min) { min = v; idx = i; } });
      return { type: 'player', idx };
    }
  }

  // Top-level render — picks the right per-screen renderer based on currentScreen,
  // also auto-navigates to the winner screen the moment the game ends.
  function render() {
    const totalsArr = totals();
    const dealer = dealerIndex(totalsArr);
    const winner = checkWinner(totalsArr);
    state.gameOver = winner !== null;

    // Auto-navigate to winner screen on first detection of a finished game
    if (winner !== null && !state.gameLogged && state.players.length > 0) {
      logFinishedGame(winner, totalsArr);
      save();
      closeSheet();
      navigate('winner');
      return;
    }

    if (state.currentScreen === 'home')    renderHome();
    if (state.currentScreen === 'play')    renderPlay(totalsArr, dealer, winner);
    if (state.currentScreen === 'history') renderHistory();
    if (state.currentScreen === 'winner')  renderWinner(totalsArr, winner);

    // Sheet renders independently of currentScreen
    if (!document.getElementById('sheet').classList.contains('hidden')) {
      renderSheet();
    }
  }

  // ===== Play screen — standings tiles + threshold info + round number =====
  function renderPlay(totalsArr, dealer, winner) {
    // Team summary (Sebeeta only — top scorer per team)
    const teamSummary = document.getElementById('teamSummary');
    if (state.gameMode === 'sebeeta') {
      teamSummary.innerHTML = [0, 1].map(ti => {
        let topIdx = -1, topScore = -Infinity;
        state.playerTeam.forEach((tIdx, pIdx) => {
          if (tIdx === ti && totalsArr[pIdx] > topScore) {
            topScore = totalsArr[pIdx];
            topIdx = pIdx;
          }
        });
        const topName = topIdx >= 0 ? state.players[topIdx] : '—';
        const score = topIdx >= 0 ? totalsArr[topIdx] : 0;
        return `<div class="team-summary-card">
          <div class="label">${escapeHtml(teamName(ti))} · ${escapeHtml(topName)}</div>
          <div class="value">${score}</div>
        </div>`;
      }).join('');
      teamSummary.classList.remove('hidden');
    } else {
      teamSummary.classList.add('hidden');
      teamSummary.innerHTML = '';
    }

    // Standings tiles
    const standings = document.getElementById('standingsContainer');
    standings.innerHTML = '';
    if (state.gameMode === 'kout') {
      const stack = document.createElement('div');
      stack.className = 'team-stack';
      // Dealer = lowest-scoring team. Only meaningful once any score is on the board.
      const anyScore = totalsArr[0] + totalsArr[1] > 0;
      [0, 1].forEach(ti => {
        const total = totalsArr[ti];
        const pct = Math.min(100, (total / state.threshold) * 100);
        const isWinner = winner && winner.type === 'team' && winner.idx === ti;
        const isDealer = anyScore && ti === dealer && !isWinner;
        const members = state.players.filter((_, pi) => state.playerTeam[pi] === ti).join(' · ');
        const tile = document.createElement('div');
        tile.className = 'team-tile' + (isWinner || isDealer ? ' leader' : '');
        const dealerBadge = isDealer ? `<span class="dealer-badge">${escapeHtml(t('dealerBadge'))}</span>` : '';
        const winnerBadge = isWinner ? `<span class="winner-badge">${escapeHtml(t('winnerBadge'))}</span>` : '';
        tile.innerHTML = `
          <div class="team-row">
            <div>
              <div class="team-name">${escapeHtml(teamName(ti))}${dealerBadge}${winnerBadge}</div>
              <div class="members">${escapeHtml(members)}</div>
            </div>
          </div>
          <div class="team-score">${total}</div>
          <div class="team-bar"><div style="width:${pct}%"></div></div>`;
        stack.appendChild(tile);
      });
      standings.appendChild(stack);
    } else {
      const grid = document.createElement('div');
      grid.className = 'player-grid';
      state.players.forEach((name, i) => {
        const total = totalsArr[i];
        const isDealer = i === dealer && total > 0;
        const isWinnerTile = winner && winner.type === 'player' && winner.idx === i;
        const pct = Math.min(100, (Math.abs(total) / state.threshold) * 100);
        const teamChip = isTeamMode()
          ? `<span class="team-chip">${escapeHtml(state.playerTeam[i] === 0 ? t('teamA') : t('teamB'))}</span>`
          : '';
        const dealerBadge = isDealer ? `<span class="dealer-badge">${escapeHtml(t('dealerBadge'))}</span>` : '';
        const winnerBadge = isWinnerTile ? `<span class="winner-badge">${escapeHtml(t('winnerBadge'))}</span>` : '';
        const tile = document.createElement('div');
        tile.className = 'player-tile' + (isWinnerTile || isDealer ? ' leader' : '');
        tile.innerHTML = `
          <div class="pt-head">
            <div class="pt-name">${escapeHtml(name)}${teamChip}${dealerBadge}${winnerBadge}</div>
            <span class="pt-seat">${i + 1}</span>
          </div>
          <div>
            <div class="pt-score">${total}</div>
            <div class="pt-bar"><div style="width:${pct}%"></div></div>
          </div>`;
        grid.appendChild(tile);
      });
      standings.appendChild(grid);
    }

    // Threshold caption
    let infoText;
    if (state.gameMode === 'sebeeta') infoText = t('sebeetaHint');
    else if (state.gameMode === 'kout') infoText = t('koutHint');
    else infoText = state.winRule === 'highest' ? t('infoHighest')(state.threshold) : t('infoLowest')(state.threshold);
    document.getElementById('thresholdInfo').textContent = infoText;

    // Round number + game-mode label in toolbar, plus the record button
    const nextRound = state.scores.length + 1;
    document.getElementById('playRoundNum').textContent = nextRound;
    document.getElementById('recordRoundNum').textContent = nextRound;
    const gameNameKey = state.gameMode === 'kout' ? 'gameKout'
                      : state.gameMode === 'sebeeta' ? 'gameSebeeta'
                      : 'gameCustom';
    document.getElementById('playGameName').textContent = t(gameNameKey);

    // Disable record/undo as appropriate
    const recordBtn = document.querySelector('#screen-play .record-btn');
    if (recordBtn) recordBtn.disabled = state.gameOver;
    const undoBtn = document.querySelector('#screen-play .undo-btn');
    if (undoBtn) undoBtn.disabled = state.scores.length === 0;
  }

  // ===== Round-entry sheet =====
  function renderSheet() {
    document.getElementById('sheetRoundNum').textContent = state.scores.length + 1;
    const rin = document.getElementById('roundInputs');
    rin.innerHTML = '';

    if (state.gameMode === 'kout') {
      renderKoutSheet(rin);
    } else {
      renderPlayerSheet(rin);
    }
  }

  function renderKoutSheet(rin) {
    const mode = state.koutEntryMode || 'contract';
    const toggle = document.createElement('div');
    toggle.className = 'entry-mode-toggle';
    toggle.innerHTML = `
      <button type="button" class="${mode === 'contract' ? 'active' : ''}" onclick="setKoutEntryMode('contract')">${escapeHtml(t('contractMode'))}</button>
      <button type="button" class="${mode === 'manual' ? 'active' : ''}" onclick="setKoutEntryMode('manual')">${escapeHtml(t('manualMode'))}</button>
    `;
    rin.appendChild(toggle);

    if (mode === 'contract') {
      const callerSec = document.createElement('div');
      callerSec.className = 'contract-section';
      callerSec.innerHTML = `<div class="label">${escapeHtml(t('callerLabel'))}</div>`;
      const callerChips = document.createElement('div');
      callerChips.className = 'contract-chips';
      [0, 1].forEach(c => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip' + (koutContract.caller === c ? ' active' : '');
        b.textContent = teamName(c);
        b.onclick = () => setContractCaller(c);
        callerChips.appendChild(b);
      });
      callerSec.appendChild(callerChips);
      rin.appendChild(callerSec);

      const levelSec = document.createElement('div');
      levelSec.className = 'contract-section';
      levelSec.innerHTML = `<div class="label">${escapeHtml(t('levelLabel'))}</div>`;
      const levelChips = document.createElement('div');
      levelChips.className = 'contract-chips';
      KOUT_LEVELS.forEach(lv => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip' + (koutContract.level === lv ? ' active' : '');
        b.textContent = koutLevelLabel(lv);
        b.onclick = () => setContractLevel(lv);
        levelChips.appendChild(b);
      });
      levelSec.appendChild(levelChips);
      rin.appendChild(levelSec);

      const outSec = document.createElement('div');
      outSec.className = 'contract-section';
      outSec.innerHTML = `<div class="label">${escapeHtml(t('outcomeLabel'))}</div>`;
      const outChips = document.createElement('div');
      outChips.className = 'contract-chips';
      [
        { key: 'made', label: t('outcomeMade'), cls: 'outcome-win' },
        { key: 'failed', label: t('outcomeFailed'), cls: 'outcome-fail' }
      ].forEach(o => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = `chip ${o.cls}` + (koutContract.outcome === o.key ? ' active' : '');
        b.textContent = o.label;
        b.onclick = () => setContractOutcome(o.key);
        outChips.appendChild(b);
      });
      outSec.appendChild(outChips);
      rin.appendChild(outSec);

      if (koutContract.caller !== null && koutContract.level && koutContract.outcome) {
        const [aScore, bScore] = computeContractScore(koutContract.caller, koutContract.level, koutContract.outcome);
        const preview = document.createElement('div');
        preview.className = 'contract-preview';
        preview.innerHTML = `
          <div class="team-result ${aScore > 0 ? 'win' : ''}">
            <div class="label">${escapeHtml(teamName(0))}</div>
            <div class="value">+${aScore}</div>
          </div>
          <div class="vs">vs</div>
          <div class="team-result ${bScore > 0 ? 'win' : ''}">
            <div class="label">${escapeHtml(teamName(1))}</div>
            <div class="value">+${bScore}</div>
          </div>`;
        rin.appendChild(preview);
      } else {
        const hint = document.createElement('div');
        hint.className = 'contract-hint';
        hint.textContent = t('contractHint');
        rin.appendChild(hint);
      }
    } else {
      // MANUAL — two entry rows
      [0, 1].forEach((ti, i) => {
        const row = document.createElement('div');
        row.className = 'entry-row';
        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.textContent = ti === 0 ? 'A' : 'B';
        row.appendChild(seat);
        const who = document.createElement('div');
        who.className = 'who';
        const members = state.players.filter((_, pi) => state.playerTeam[pi] === ti).join(' · ');
        who.innerHTML = `${escapeHtml(teamName(ti))}<span class="members">${escapeHtml(members)}</span>`;
        row.appendChild(who);
        const input = document.createElement('input');
        input.type = 'number';
        input.inputMode = 'numeric';
        input.id = 'roundScore' + i;
        input.value = '0';
        input.addEventListener('focus', () => input.select());
        input.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          if (i < 1) document.getElementById('roundScore1')?.focus();
          else submitRound();
        });
        row.appendChild(input);
        rin.appendChild(row);
      });
    }
  }

  function renderPlayerSheet(rin) {
    // Sebeeta + Custom: per-player entries, with optional numpad style
    const style = state.entryStyle || 'pm';

    const styleToggle = document.createElement('div');
    styleToggle.className = 'entry-style-toggle';
    styleToggle.innerHTML = `
      <button type="button" class="${style === 'pm' ? 'active' : ''}" onclick="setEntryStyle('pm')">${escapeHtml(t('entryStylePlusMinus'))}</button>
      <button type="button" class="${style === 'numpad' ? 'active' : ''}" onclick="setEntryStyle('numpad')">${escapeHtml(t('entryStyleNumpad'))}</button>
    `;
    rin.appendChild(styleToggle);

    if (style === 'numpad') {
      renderNumpadEntry(rin);
    } else {
      renderPlayerRowsEntry(rin);
    }
  }

  function renderPlayerRowsEntry(rin) {
    const entries = state.players.map((name, i) => ({ name, seat: (i + 1).toString() }));
    const n = entries.length;
    entries.forEach((ent, i) => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.textContent = ent.seat;
      row.appendChild(seat);
      const who = document.createElement('div');
      who.className = 'who';
      who.textContent = ent.name;
      row.appendChild(who);
      const input = document.createElement('input');
      input.type = 'number';
      input.inputMode = 'numeric';
      input.id = 'roundScore' + i;
      input.value = '0';
      input.addEventListener('focus', () => input.select());
      input.addEventListener('input', () => {
        const btn = document.getElementById('minusBtn' + i);
        if (btn && parseInt(input.value) !== -10) btn.classList.remove('active');
      });
      input.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        if (i < n - 1) document.getElementById('roundScore' + (i + 1))?.focus();
        else submitRound();
      });
      row.appendChild(input);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.id = 'minusBtn' + i;
      btn.className = 'minus-btn';
      btn.textContent = '−10';
      btn.onclick = () => toggleMinus(i);
      row.appendChild(btn);
      rin.appendChild(row);
    });
  }

  // Numpad entry: one player at a time, with a 3x4 keypad
  let numpadActive = 0;        // which player is currently being entered
  let numpadBuffer = '0';      // current input value as a string ('-' allowed at front)
  let numpadValues = [];       // committed values per player for this round
  function renderNumpadEntry(rin) {
    // Initialize numpad state if not already
    if (numpadValues.length !== state.players.length) {
      numpadValues = state.players.map(() => 0);
      numpadActive = 0;
      numpadBuffer = '0';
    }

    const sec = document.createElement('div');
    sec.className = 'numpad-section';

    // Current player context
    const ctx = document.createElement('div');
    ctx.className = 'numpad-context';
    ctx.innerHTML = `
      <div class="seat">${numpadActive + 1}</div>
      <div class="who">${escapeHtml(state.players[numpadActive] || '')}</div>
      <div style="font-family:var(--font-num); font-size:12px; color:var(--muted);">
        ${numpadActive + 1} / ${state.players.length}
      </div>
    `;
    sec.appendChild(ctx);

    const display = document.createElement('div');
    display.className = 'numpad-display';
    display.textContent = numpadBuffer;
    sec.appendChild(display);

    const grid = document.createElement('div');
    grid.className = 'numpad-grid';
    // Row 1-3: digits, Row 4: sign, 0, backspace; bottom row: prev/next/penalty
    const keys = [
      ['1','2','3'],
      ['4','5','6'],
      ['7','8','9'],
      ['±','0','⌫']
    ];
    keys.flat().forEach(k => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = k;
      if (k === '±') b.className = 'np-sign';
      if (k === '⌫') b.className = 'np-sign';
      b.onclick = () => numpadKey(k);
      grid.appendChild(b);
    });
    sec.appendChild(grid);

    // Footer row: prev / -10 penalty / next-or-save
    const footer = document.createElement('div');
    footer.className = 'numpad-grid numpad-nav';
    footer.style.marginTop = '6px';
    const isLast = numpadActive === state.players.length - 1;

    const prev = document.createElement('button');
    prev.type = 'button';
    prev.className = 'np-sign';
    prev.innerHTML = `<span class="np-arrow">‹</span><span class="np-label">${escapeHtml(t('prevPlayer'))}</span>`;
    prev.disabled = numpadActive === 0;
    prev.onclick = () => numpadNav(-1);
    footer.appendChild(prev);

    const pen = document.createElement('button');
    pen.type = 'button';
    pen.className = 'np-pen';
    pen.textContent = '−10';
    pen.onclick = () => { numpadBuffer = '-10'; renderSheet(); };
    footer.appendChild(pen);

    const next = document.createElement('button');
    next.type = 'button';
    next.className = 'np-action';
    if (isLast) {
      next.textContent = t('saveBtn');
    } else {
      next.innerHTML = `<span class="np-label">${escapeHtml(t('nextPlayer'))}</span><span class="np-arrow">›</span>`;
    }
    next.onclick = () => numpadNav(+1);
    footer.appendChild(next);

    sec.appendChild(footer);
    rin.appendChild(sec);
  }

  function numpadKey(k) {
    if (k === '⌫') {
      numpadBuffer = numpadBuffer.length > 1 ? numpadBuffer.slice(0, -1) : '0';
      if (numpadBuffer === '-') numpadBuffer = '0';
    } else if (k === '±') {
      if (numpadBuffer === '0') numpadBuffer = '-';
      else if (numpadBuffer.startsWith('-')) numpadBuffer = numpadBuffer.slice(1);
      else numpadBuffer = '-' + numpadBuffer;
    } else {
      // digit
      if (numpadBuffer === '0') numpadBuffer = k;
      else if (numpadBuffer === '-') numpadBuffer = '-' + k;
      else numpadBuffer = numpadBuffer + k;
    }
    renderSheet();
  }

  function numpadNav(dir) {
    // Commit current value to the active slot first.
    const v = parseInt(numpadBuffer, 10);
    numpadValues[numpadActive] = isNaN(v) ? 0 : v;
    const next = numpadActive + dir;
    if (next < 0) return;
    if (next >= state.players.length) {
      // Reached the end → submit via the unified path so the numpad gets the
      // same FX, undo toast, and winner detection as the bulk + contract paths.
      submitRound();
      return;
    }
    numpadActive = next;
    numpadBuffer = String(numpadValues[numpadActive] ?? 0);
    renderSheet();
  }

  function setEntryStyle(style) {
    state.entryStyle = style;
    save();
    renderSheet();
  }

  // ===== History screen =====
  function renderHistory() {
    const head = document.getElementById('historyHead');
    const colHeaders = state.gameMode === 'kout'
      ? [0, 1].map(ti => ({ name: teamName(ti) }))
      : state.players.map((name) => ({ name }));
    head.innerHTML = `<th>${escapeHtml(t('thRound'))}</th>` +
      colHeaders.map(c => `<th>${escapeHtml(c.name)}</th>`).join('') +
      `<th>${escapeHtml(t('thActions'))}</th>`;
    const hbody = document.getElementById('historyBody');
    hbody.innerHTML = '';
    const colCount = colHeaders.length;
    let runningTotals = new Array(colCount).fill(0);
    const dealerBadgeHtml = `<span class="dealer-badge" style="margin-inline-start:0;display:inline-block;margin-top:2px;">${escapeHtml(t('dealerBadge'))}</span>`;
    state.scores.forEach((round, ri) => {
      runningTotals = runningTotals.map((v, i) => v + (round[i] || 0));
      // Who is the dealer at the end of this round? Only mark once someone has scored.
      const dIdx = runningTotals.some(v => v > 0) ? dealerIndex(runningTotals) : -1;
      const tr = document.createElement('tr');
      if (editingRound === ri) {
        const lastIdx = colCount - 1;
        const inputs = [];
        for (let i = 0; i < colCount; i++) {
          inputs.push(`<td><input type="number" inputmode="numeric" id="editScore_${ri}_${i}" value="${round[i] || 0}" onfocus="this.select()" onkeydown="handleEditKey(event, ${ri}, ${i}, ${lastIdx})" /></td>`);
        }
        tr.innerHTML = `<td><strong>${ri+1}</strong></td>` +
          inputs.join('') +
          `<td>
            <button onclick="saveEditedRound(${ri})">${escapeHtml(t('saveBtn'))}</button>
            <button class="secondary" onclick="cancelEditRound()" style="margin-inline-start:4px;">${escapeHtml(t('cancelBtn'))}</button>
          </td>`;
      } else {
        const cells = [];
        for (let i = 0; i < colCount; i++) {
          const isDealerCell = i === dIdx;
          cells.push(`<td><span class="num">${round[i] || 0}</span><span class="running">${runningTotals[i]}${isDealerCell ? ' ' + dealerBadgeHtml : ''}</span></td>`);
        }
        tr.innerHTML = `<td><strong>${ri+1}</strong></td>` +
          cells.join('') +
          `<td>
            <button class="secondary" onclick="startEditRound(${ri})">${escapeHtml(t('editBtn'))}</button>
            <button class="danger" onclick="deleteRound(${ri})" style="margin-inline-start:4px;">${escapeHtml(t('deleteBtn'))}</button>
          </td>`;
      }
      hbody.appendChild(tr);
    });
  }

  // ===== Winner screen =====
  function renderWinner(totalsArr, winner) {
    if (!winner) return;
    let name, score;
    if (winner.type === 'player') {
      name = state.players[winner.idx];
      score = totalsArr[winner.idx];
    } else if (state.gameMode === 'kout') {
      // Kout: team totals are stored directly per-team in totalsArr.
      name = teamName(winner.idx);
      score = `${totalsArr[winner.idx]}–${totalsArr[1 - winner.idx]}`;
    } else {
      // Sebeeta: totalsArr is per-player; roll up to team totals so the
      // winner card shows the winning team's score vs. the losing team.
      name = teamName(winner.idx);
      const tT = teamTotalsFromPlayers(totalsArr);
      score = `${tT[winner.idx]}–${tT[1 - winner.idx]}`;
    }
    document.getElementById('winnerName').textContent = name;
    document.getElementById('winnerScore').textContent = String(score);
    const meta = `${t('roundsPlayed')(state.scores.length)}`;
    document.getElementById('winnerMeta').textContent = meta;
  }

  function submitRound() {
    let round;
    if (state.gameMode === 'kout' && state.koutEntryMode === 'contract') {
      // Validate contract is complete
      if (koutContract.caller === null || !koutContract.level || !koutContract.outcome) {
        alert(t('contractHint'));
        return;
      }
      round = computeContractScore(koutContract.caller, koutContract.level, koutContract.outcome);
      resetContract();
    } else if (state.entryStyle === 'numpad' &&
               (state.gameMode === 'sebeeta' || state.gameMode === 'custom')) {
      // Numpad path: the in-progress numpadBuffer hasn't been written into
      // numpadValues yet, so commit it before slicing. Untouched players keep
      // their last value (0 by default) — allows mid-way Save without errors.
      const v = parseInt(numpadBuffer, 10);
      numpadValues[numpadActive] = isNaN(v) ? 0 : v;
      round = numpadValues.slice();
      numpadValues = state.players.map(() => 0);
      numpadActive = 0;
      numpadBuffer = '0';
    } else {
      const n = state.gameMode === 'kout' ? 2 : state.players.length;
      round = [];
      for (let i = 0; i < n; i++) {
        const v = parseInt(document.getElementById('roundScore' + i).value);
        round.push(isNaN(v) ? 0 : v);
      }
    }
    state.scores.push(round);
    closeSheet();
    save();
    render();
    // Audio + haptic confirmation. render() above will have flipped gameOver if
    // applicable, so emit the bigger "win" cue in that case.
    if (state.gameOver) fxGameOver();
    else                fxRoundCommit();
    // Surface an "Undo" affordance for a few seconds without needing the confirm dialog.
    // We only show this when the game isn't already over (otherwise the winner screen
    // is taking over anyway).
    if (!state.gameOver) {
      showToast(t('toastRoundAdded'), t('undoAction'), undoRoundSilently);
    }
  }

  // ===== Toast =====
  // Lightweight snackbar-style toast pinned to the bottom of the screen.
  // Renders a message and an optional action button; auto-dismisses after `ms`.
  let _toastTimer = null;
  function showToast(message, actionLabel, actionFn, ms) {
    const el = document.getElementById('toast');
    const msg = document.getElementById('toastMsg');
    const btn = document.getElementById('toastAction');
    if (!el || !msg || !btn) return;
    msg.textContent = message;
    if (actionLabel && typeof actionFn === 'function') {
      btn.textContent = actionLabel;
      btn.style.display = '';
      btn.onclick = () => { hideToast(); actionFn(); };
    } else {
      btn.style.display = 'none';
      btn.onclick = null;
    }
    el.classList.remove('hidden');
    // Force reflow so the transition runs.
    // eslint-disable-next-line no-unused-expressions
    el.offsetWidth;
    el.classList.add('visible');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(hideToast, ms || 4000);
  }
  function hideToast() {
    const el = document.getElementById('toast');
    if (!el) return;
    el.classList.remove('visible');
    if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
    // Wait for transition to finish before hiding for real, otherwise we get a flash.
    setTimeout(() => el.classList.add('hidden'), 220);
  }
  // Confirm-free undo, used by the toast.
  function undoRoundSilently() {
    if (state.scores.length === 0) return;
    state.scores.pop();
    save();
    render();
    fxUndo();
    showToast(t('toastRoundUndone'));
  }

  // ===== Share game summary as PNG =====
  // Renders the final standings to a canvas, then either invokes the native
  // share sheet (mobile, where Web Share API Level 2 supports files) or falls
  // back to downloading the image (desktop).
  async function shareGameImage() {
    try {
      const blob = await renderGameSummaryPNG();
      if (!blob) throw new Error('no blob');
      const filename = `qaid-${new Date().toISOString().slice(0, 10)}.png`;
      const file = new File([blob], filename, { type: 'image/png' });
      // Prefer native share sheet so the user can pick WhatsApp/iMessage/etc.
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: t('shareTitle') });
          return;
        } catch (e) {
          // User cancelled. AbortError is the documented signal; ignore.
          if (e && e.name === 'AbortError') return;
          // Any other failure → fall through to download.
        }
      }
      // Download fallback (desktop or where Web Share files isn't supported).
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Defer revoke so the browser has time to start the download.
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      console.error('shareGameImage failed:', e);
      alert(t('shareError'));
    }
  }

  // Build a 1080×1350 (4:5 portrait, IG-friendly) PNG of the final standings.
  // Mirrors the in-app aesthetic: light/dark theme, gradient bg, glass card.
  async function renderGameSummaryPNG() {
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (_) {}
    }
    const W = 1080, H = 1350;
    const isDark = state.theme === 'dark';
    const rtl = state.lang === 'ar';

    const C = isDark ? {
      bgTop: '#1a233e', bgBottom: '#0a0a0c',
      surface: 'rgba(36,36,40,0.85)',
      line:    'rgba(255,255,255,0.14)',
      ink:     '#f5f5f7',
      inkSoft: '#d6d6d8',
      muted:   '#9b9b9f',
      gold:    '#ffd60a',
      onGold:  '#1a1100',
      glow1:   'rgba(110,80,40,0.55)',
      glow2:   'rgba(40,80,140,0.5)',
    } : {
      bgTop: '#fff3d6', bgBottom: '#f0eee9',
      surface: 'rgba(255,255,255,0.92)',
      line:    'rgba(0,0,0,0.10)',
      ink:     '#0a0a0a',
      inkSoft: '#2a2a2a',
      muted:   '#6e6e72',
      gold:    '#f5b800',
      onGold:  '#1a1100',
      glow1:   'rgba(255,210,170,0.7)',
      glow2:   'rgba(150,200,255,0.55)',
    };

    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // --- Background gradient + glow blobs ---
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, C.bgTop);
    grad.addColorStop(1, C.bgBottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    softBlob(ctx, W * 0.82, 120, 420, C.glow1);
    softBlob(ctx, W * 0.12, 260, 360, C.glow2);
    softBlob(ctx, W * 0.5,  H - 140, 380, C.glow1);

    // Font helpers — fall back gracefully if web fonts haven't loaded.
    const fbody = (size, weight) => `${weight || 600} ${size}px Geist, "IBM Plex Sans Arabic", system-ui, -apple-system, sans-serif`;
    const fmono = (size, weight) => `${weight || 600} ${size}px "Geist Mono", ui-monospace, monospace`;

    const PAD = 72;
    ctx.textBaseline = 'top';
    ctx.direction = rtl ? 'rtl' : 'ltr';

    // --- Header: brand eyebrow + mode title ---
    ctx.textAlign = rtl ? 'right' : 'left';
    const headX = rtl ? W - PAD : PAD;

    ctx.fillStyle = C.muted;
    ctx.font = fbody(28, 600);
    const brand = rtl ? 'قيد بلوك ٣' : 'QAID · BLOCK 3';
    ctx.fillText(brand, headX, PAD);

    const modeKey = state.gameMode === 'kout' ? 'gameKout'
                  : state.gameMode === 'sebeeta' ? 'gameSebeeta' : 'gameCustom';
    ctx.fillStyle = C.ink;
    ctx.font = fbody(72, 700);
    ctx.fillText(t(modeKey), headX, PAD + 44);

    // Date in the opposite corner
    const date = new Date().toLocaleDateString(rtl ? 'ar-EG' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    ctx.textAlign = rtl ? 'left' : 'right';
    ctx.fillStyle = C.muted;
    ctx.font = fbody(24, 500);
    ctx.fillText(date, rtl ? PAD : W - PAD, PAD + 12);

    // --- Winner / standings data ---
    // Each team row carries an optional players[] list (name + score). Sebeeta
    // has per-player scores; Kout doesn't track them (contracts pay the team),
    // so players show name-only and the team total stays on the header.
    const totalsArr = totals();
    const winner = checkWinner(totalsArr);

    // Build {name, score|null} entries for the players on a team.
    // Pass playerTotals=null when per-player scores aren't meaningful (Kout).
    function _teamPlayersWithScores(teamIdx, playerTotals) {
      const out = [];
      (state.playerTeam || []).forEach((tIdx, pIdx) => {
        if (tIdx === teamIdx && state.players[pIdx]) {
          out.push({
            name: state.players[pIdx],
            score: playerTotals ? playerTotals[pIdx] : null,
          });
        }
      });
      return out;
    }

    let rows = [];
    if (state.gameMode === 'kout') {
      rows = [
        { name: teamName(0), score: totalsArr[0], isTeam: true, idx: 0, showHeaderScore: true,  players: _teamPlayersWithScores(0, null) },
        { name: teamName(1), score: totalsArr[1], isTeam: true, idx: 1, showHeaderScore: true,  players: _teamPlayersWithScores(1, null) },
      ];
    } else if (state.gameMode === 'sebeeta') {
      const tT = teamTotalsFromPlayers(totalsArr);
      rows = [
        { name: teamName(0), score: tT[0], isTeam: true, idx: 0, showHeaderScore: false, players: _teamPlayersWithScores(0, totalsArr) },
        { name: teamName(1), score: tT[1], isTeam: true, idx: 1, showHeaderScore: false, players: _teamPlayersWithScores(1, totalsArr) },
      ];
    } else {
      rows = state.players.map((nm, i) => ({
        name: nm, score: totalsArr[i], isTeam: false, idx: i, showHeaderScore: true, players: [],
      }));
    }
    // Sort: best-by-winRule first.
    rows = rows.slice().sort((a, b) =>
      state.winRule === 'highest' ? (b.score - a.score) : (a.score - b.score)
    );

    // Resolve the winner display from rows. Sebeeta intentionally has no
    // score subtitle on the winner card — the team name is enough.
    let winnerName, winnerScoreText;
    if (winner && winner.type === 'team' && state.gameMode === 'kout') {
      winnerName = teamName(winner.idx);
      winnerScoreText = `${totalsArr[winner.idx]}–${totalsArr[1 - winner.idx]}`;
    } else if (winner && winner.type === 'team' && state.gameMode === 'sebeeta') {
      winnerName = teamName(winner.idx);
      winnerScoreText = '';
    } else if (winner && winner.type === 'team') {
      winnerName = teamName(winner.idx);
      winnerScoreText = String((rows.find(r => r.idx === winner.idx) || rows[0]).score);
    } else if (winner && winner.type === 'player') {
      winnerName = state.players[winner.idx];
      winnerScoreText = String(totalsArr[winner.idx]);
    } else {
      // Mid-game: leader from rows. Sebeeta intentionally suppresses the
      // numeric score subtitle (matches the in-game design intent).
      winnerName = rows[0].name || '—';
      winnerScoreText = state.gameMode === 'sebeeta' ? '' : String(rows[0].score);
    }

    // --- Winner card ---
    const cardX = PAD, cardY = PAD + 160;
    const cardW = W - PAD * 2, cardH = 360;
    drawRoundRect(ctx, cardX, cardY, cardW, cardH, 36);
    ctx.fillStyle = C.surface;
    ctx.fill();
    ctx.strokeStyle = C.line;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.font = '140px "Apple Color Emoji", "Segoe UI Emoji", sans-serif';
    ctx.fillStyle = C.gold;
    ctx.fillText('🏆', W / 2, cardY + 32);

    ctx.fillStyle = C.ink;
    ctx.font = fbody(72, 700);
    ctx.fillText(winnerName, W / 2, cardY + 190);

    ctx.fillStyle = C.muted;
    ctx.font = fmono(40, 600);
    ctx.fillText(winnerScoreText, W / 2, cardY + 282);

    // --- Standings list ---
    let listY = cardY + cardH + 60;
    ctx.textAlign = rtl ? 'right' : 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = C.muted;
    ctx.font = fbody(22, 600);
    const eyebrow = (t('finalStandings') || 'Final Standings').toUpperCase();
    ctx.fillText(eyebrow, headX, listY);
    listY += 38;

    // Row height adapts to player count when teams are present.
    // Layout: top padding, header line (team or solo name), per-player lines, bottom padding.
    const HEADER_LINE  = 50;
    const PLAYER_LINE  = 32;
    const ROW_PAD_TOP  = 22;
    const ROW_PAD_BOT  = 22;
    const SOLO_ROW_H   = 88; // unchanged for Custom

    function _rowHeight(r) {
      if (!r.isTeam) return SOLO_ROW_H;
      const n = (r.players && r.players.length) || 0;
      return ROW_PAD_TOP + HEADER_LINE + (n > 0 ? n * PLAYER_LINE : 0) + ROW_PAD_BOT;
    }

    const rowGap = 14;
    let cursorY = listY;
    rows.forEach((r, i) => {
      const rh = _rowHeight(r);
      const ry = cursorY;
      cursorY += rh + rowGap;

      drawRoundRect(ctx, PAD, ry, W - PAD * 2, rh, 26);
      ctx.fillStyle = i === 0 ? withAlpha(C.gold, 0.18) : C.surface;
      ctx.fill();
      ctx.strokeStyle = i === 0 ? withAlpha(C.gold, 0.45) : C.line;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Rank chip — aligned to the header line, not the whole row's centre.
      const chipR = 22;
      const chipCX = rtl ? W - PAD - 40 : PAD + 40;
      const chipCY = r.isTeam ? ry + ROW_PAD_TOP + HEADER_LINE / 2 : ry + rh / 2;
      ctx.beginPath();
      ctx.arc(chipCX, chipCY, chipR, 0, Math.PI * 2);
      ctx.fillStyle = i === 0 ? C.gold : withAlpha(C.ink, 0.10);
      ctx.fill();
      ctx.fillStyle = i === 0 ? C.onGold : C.ink;
      ctx.font = fbody(22, 700);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), chipCX, chipCY + 1);

      ctx.textAlign = rtl ? 'right' : 'left';
      const nameX     = rtl ? W - PAD - 80 : PAD + 80;
      const scoreEdge = rtl ? PAD + 28      : W - PAD - 28;

      if (r.isTeam) {
        // --- Header line: team name + (optional) team total ---
        ctx.textBaseline = 'middle';
        ctx.fillStyle = C.ink;
        ctx.font = fbody(34, 700);
        ctx.fillText(r.name || '—', nameX, chipCY);

        if (r.showHeaderScore) {
          ctx.textAlign = rtl ? 'left' : 'right';
          ctx.fillStyle = C.inkSoft;
          ctx.font = fmono(36, 600);
          ctx.fillText(String(r.score), scoreEdge, chipCY);
        }

        // --- Per-player lines ---
        if (r.players && r.players.length > 0) {
          // Faint divider between header and players.
          ctx.beginPath();
          const divY = ry + ROW_PAD_TOP + HEADER_LINE;
          ctx.moveTo(PAD + 28, divY);
          ctx.lineTo(W - PAD - 28, divY);
          ctx.strokeStyle = C.line;
          ctx.lineWidth = 1;
          ctx.stroke();

          r.players.forEach((p, pi) => {
            const py = ry + ROW_PAD_TOP + HEADER_LINE + (pi + 0.5) * PLAYER_LINE;
            // Name
            ctx.textAlign = rtl ? 'right' : 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = C.inkSoft;
            ctx.font = fbody(22, 500);
            ctx.fillText(p.name || '—', nameX, py);
            // Per-player score (sebeeta only — kout sets score to null)
            if (p.score !== null && p.score !== undefined) {
              ctx.textAlign = rtl ? 'left' : 'right';
              ctx.fillStyle = C.muted;
              ctx.font = fmono(22, 600);
              ctx.fillText(String(p.score), scoreEdge, py);
            }
          });
        }
      } else {
        // Solo row (Custom mode): single line, name + score.
        ctx.textBaseline = 'middle';
        ctx.fillStyle = C.ink;
        ctx.font = fbody(34, 600);
        ctx.fillText(r.name || '—', nameX, ry + rh / 2);
        ctx.textAlign = rtl ? 'left' : 'right';
        ctx.fillStyle = C.inkSoft;
        ctx.font = fmono(36, 600);
        ctx.fillText(String(r.score), scoreEdge, ry + rh / 2);
      }
    });

    // --- Footer: rounds + meta ---
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = C.muted;
    ctx.font = fbody(24, 500);
    const footer = t('roundsPlayed') ? t('roundsPlayed')(state.scores.length) : `${state.scores.length} rounds`;
    ctx.fillText(footer, W / 2, H - PAD);

    return new Promise((resolve) => canvas.toBlob((b) => resolve(b), 'image/png', 0.95));
  }

  // --- Canvas helpers ---
  function drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
  function softBlob(ctx, cx, cy, radius, color) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    g.addColorStop(0, color);
    g.addColorStop(1, color.replace(/[\d.]+\)$/, '0)'));
    ctx.fillStyle = g;
    ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
  }
  // Convert "#rrggbb" or "rgba(r,g,b,a)" into rgba with a new alpha.
  function withAlpha(color, alpha) {
    if (color.startsWith('rgba')) {
      return color.replace(/rgba\(([^)]+)\)/, (_, body) => {
        const parts = body.split(',').map(s => s.trim());
        return `rgba(${parts[0]},${parts[1]},${parts[2]},${alpha})`;
      });
    }
    if (color.startsWith('rgb(')) {
      return color.replace(/rgb\(([^)]+)\)/, (_, body) => `rgba(${body}, ${alpha})`);
    }
    if (color.startsWith('#')) {
      const hex = color.slice(1);
      const v = hex.length === 3
        ? hex.split('').map(c => parseInt(c + c, 16))
        : [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
      return `rgba(${v[0]},${v[1]},${v[2]},${alpha})`;
    }
    return color;
  }

  function toggleMinus(i) {
    const input = document.getElementById('roundScore' + i);
    const btn = document.getElementById('minusBtn' + i);
    if (!input || !btn) return;
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      input.value = '0';
    } else {
      btn.classList.add('active');
      input.value = '-10';
    }
  }

  function startEditRound(ri) {
    editingRound = ri;
    render();
    // Focus first edit input after render
    setTimeout(() => {
      const f = document.getElementById(`editScore_${ri}_0`);
      if (f) f.focus();
    }, 0);
  }

  function handleEditKey(ev, ri, i, lastIdx) {
    if (ev.key !== 'Enter') return;
    ev.preventDefault();
    if (i < lastIdx) {
      const next = document.getElementById(`editScore_${ri}_${i + 1}`);
      if (next) next.focus();
    } else {
      saveEditedRound(ri);
    }
  }

  function cancelEditRound() {
    editingRound = null;
    render();
  }

  function saveEditedRound(ri) {
    const n = state.gameMode === 'kout' ? 2 : state.players.length;
    const updated = [];
    for (let i = 0; i < n; i++) {
      const v = parseInt(document.getElementById(`editScore_${ri}_${i}`).value);
      updated.push(isNaN(v) ? 0 : v);
    }
    state.scores[ri] = updated;
    editingRound = null;
    save();
    render();
  }

  function deleteRound(ri) {
    if (!confirm(t('confirmDelete')(ri + 1))) return;
    state.scores.splice(ri, 1);
    if (editingRound === ri) editingRound = null;
    else if (editingRound !== null && editingRound > ri) editingRound -= 1;
    save();
    render();
  }

  function undoRound() {
    if (state.scores.length === 0) return;
    if (!confirm(t('confirmUndo'))) return;
    state.scores.pop();
    save();
    render();
  }

  function resetGame() {
    if (!confirm(t('confirmReset'))) return;
    // Keep players, threshold, winRule, lang. Just wipe scores & end-of-game state.
    state.scores = [];
    state.gameOver = false;
    state.gameLogged = false;
    editingRound = null;
    resetContract();
    save();
    navigate('play');
  }

  function clearPlayers() {
    if (!confirm(t('confirmClearPlayers'))) return;
    // Preserve cross-game settings the user has explicitly opted into.
    const keepLang       = state.lang;
    const keepTheme      = state.theme || 'light';
    const keepSound      = state.sound || 'on';
    const keepKoutMode   = state.koutEntryMode || 'contract';
    const keepRecents    = state.recentGames || [];
    const keepEntryStyle = state.entryStyle || 'pm';
    localStorage.removeItem(STORAGE_KEY);
    state = {
      gameMode: 'sebeeta', players: [], playerTeam: [], teamNames: [], scores: [],
      threshold: 201, winRule: 'lowest', gameOver: false, gameLogged: false,
      lang: keepLang, theme: keepTheme, sound: keepSound,
      koutEntryMode: keepKoutMode, entryStyle: keepEntryStyle,
      currentScreen: 'home', recentGames: keepRecents
    };
    editingRound = null;
    resetContract();
    document.getElementById('playerNameSection').classList.add('hidden');
    applyLang();
    applyTheme();
    applySound();
    navigate('home');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Init
  applyTheme();
  applyLang();
  applySound();
  if (!load()) {
    // Fresh session — land on Home screen
    navigate('home');
  }

  // ESC closes the round sheet
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !document.getElementById('sheet').classList.contains('hidden')) {
      closeSheet();
    }
  });

  // Register the service worker so the app installs as a PWA and works offline.
  // We don't await this — the app should run fine even if registration fails
  // (e.g. when served from file:// during local dev).
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>

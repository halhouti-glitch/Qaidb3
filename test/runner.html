<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Qaid · Tests</title>
<style>
  body {
    font: 14px/1.5 ui-monospace, "Geist Mono", Menlo, monospace;
    background: #0a0a0c;
    color: #e6e6ea;
    padding: 24px;
    max-width: 880px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; margin: 0 0 18px; letter-spacing: -0.01em; }
  .summary {
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.05);
    font-weight: 600;
  }
  .summary.pass { background: rgba(48, 209, 88, 0.12); color: #74e896; }
  .summary.fail { background: rgba(255, 69, 58, 0.14); color: #ff8a80; }
  .case {
    padding: 8px 12px;
    border-radius: 8px;
    margin: 2px 0;
    background: rgba(255,255,255,0.03);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .case.pass { color: #b6d7c2; }
  .case.fail { color: #ffaba6; background: rgba(255, 69, 58, 0.08); }
  .badge { flex-shrink: 0; font-weight: 700; }
  .pass .badge::before { content: '✓'; color: #30d158; }
  .fail .badge::before { content: '✗'; color: #ff453a; }
  .name { flex: 1; }
  .diff {
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.4);
    border-radius: 6px;
    white-space: pre-wrap;
    color: #ffd58a;
    font-size: 13px;
  }
  .group {
    margin: 18px 0 6px;
    color: #9b9b9f;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
  }
</style>
</head>
<body>
<h1>Qaid scoring tests</h1>
<div id="summary" class="summary">Running…</div>
<div id="results"></div>

<script type="module">
import './scoring.test.js';
import { _runAll } from './harness.js';
_runAll();
</script>
</body>
</html>
